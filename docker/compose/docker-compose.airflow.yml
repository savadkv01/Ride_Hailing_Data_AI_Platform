services:
  airflow-postgres:
    image: postgres:16
    container_name: rh-airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - platform_core_net

  airflow-init:
    image: apache/airflow:2.10.2
    container_name: rh-airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-docker==3.11.0 docker==7.1.0
      HOST_PROJECT_ROOT: "C:/D Drive/Projects/DE/Projects/Ride_hailing_data_ai_platform"
      HOST_LAKEHOUSE_PATH: "C:/D Drive/Projects/DE/Projects/Ride_hailing_data_ai_platform/lakehouse"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../logs/airflow:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "airflow db migrate && airflow users create --role Admin --username admin --password admin --firstname Admin --lastname User --email admin@local"
    depends_on:
      - airflow-postgres
    networks:
      - platform_core_net

  airflow-webserver:
    image: apache/airflow:2.10.2
    container_name: rh-airflow-webserver
    ports:
      - "8088:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-docker==3.11.0 docker==7.1.0
      HOST_PROJECT_ROOT: "C:/D Drive/Projects/DE/Projects/Ride_hailing_data_ai_platform"
      HOST_LAKEHOUSE_PATH: "C:/D Drive/Projects/DE/Projects/Ride_hailing_data_ai_platform/lakehouse"
    command: webserver
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../logs/airflow:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - platform_core_net

  airflow-scheduler:
    image: apache/airflow:2.10.2
    container_name: rh-airflow-scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-docker==3.11.0 docker==7.1.0
      HOST_PROJECT_ROOT: "C:/D Drive/Projects/DE/Projects/Ride_hailing_data_ai_platform"
      HOST_LAKEHOUSE_PATH: "C:/D Drive/Projects/DE/Projects/Ride_hailing_data_ai_platform/lakehouse"
    command: scheduler
    volumes:
      - ../../orchestration/airflow/dags:/opt/airflow/dags
      - ../../logs/airflow:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - platform_core_net

volumes:
  airflow_postgres_data:

networks:
  platform_core_net:
    external: true
