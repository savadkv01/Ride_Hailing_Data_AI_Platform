services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: rh-spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8081
    ports:
      - "7077:7077"
      - "8081:8081"
    volumes:
      - spark_checkpoints:/opt/spark/checkpoints
      - ../../processing/spark:/opt/spark/jobs
      - ../../lakehouse:/opt/lakehouse
      - ../spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    networks:
      - platform_core_net
      - monitoring_net

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: rh-spark-worker-1
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    volumes:
      - spark_checkpoints:/opt/spark/checkpoints
      - ../../processing/spark:/opt/spark/jobs
      - ../../lakehouse:/opt/lakehouse
    networks:
      - platform_core_net
      - monitoring_net

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: rh-spark-worker-2
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    volumes:
      - spark_checkpoints:/opt/spark/checkpoints
      - ../../processing/spark:/opt/spark/jobs
      - ../../lakehouse:/opt/lakehouse
    networks:
      - platform_core_net
      - monitoring_net

volumes:
  spark_checkpoints:

networks:
  platform_core_net:
    external: true
  monitoring_net:
    external: true
