name: ride-hailing-platform

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: rh-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_NUM_PARTITIONS: 6
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ../kafka/topics-bootstrap.sh:/opt/kafka/topics-bootstrap.sh:ro
    networks:
      - platform_core_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 12

  postgres:
    image: postgres:16
    container_name: rh-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d
    networks:
      - platform_core_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: rh-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ride_hailing_ops
    volumes:
      - mongodb_data:/data/db
      - ../mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - platform_core_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 20s
      timeout: 10s
      retries: 10

  weaviate:
    image: semitechnologies/weaviate:1.26.6
    container_name: rh-weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_API_BASED_MODULES: "false"
      CLUSTER_HOSTNAME: node1
    volumes:
      - vector_data:/var/lib/weaviate
    networks:
      - platform_core_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 20s
      timeout: 10s
      retries: 12

  ollama:
    image: ollama/ollama:0.6.2
    container_name: rh-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - platform_core_net
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10

  fastapi:
    build:
      context: ../../
      dockerfile: api/fastapi/Dockerfile
    container_name: rh-fastapi
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017
      WEAVIATE_URL: http://weaviate:8080
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ../../ml/artifacts:/app/ml/artifacts:ro
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - platform_core_net
      - serving_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 20s
      timeout: 10s
      retries: 10

  streamlit-ui:
    build:
      context: ../../
      dockerfile: ui/streamlit/Dockerfile
    container_name: rh-streamlit-ui
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      RIDE_API_URL: http://fastapi:8000
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - serving_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5).read()"]
      interval: 20s
      timeout: 10s
      retries: 10

networks:
  platform_core_net:
    name: platform_core_net
  serving_net:
    name: serving_net
  monitoring_net:
    name: monitoring_net

volumes:
  kafka_data:
  postgres_data:
  mongodb_data:
  vector_data:
  ollama_data:
