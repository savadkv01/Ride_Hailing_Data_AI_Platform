global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ['fastapi:8000']

  - job_name: spark-master
    static_configs:
      - targets: ['spark-master:8081']

  - job_name: kafka
    static_configs:
      - targets: ['kafka:9092']
