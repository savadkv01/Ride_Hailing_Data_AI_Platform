weaviate:
  url: http://localhost:8080
  class_name: RideDocument
  default_top_k: 5

embedding:
  provider: ollama
  hash_dim: 256
  ollama_url: http://localhost:11434
  ollama_embedding_model: nomic-embed-text
  allow_fallback_to_hash: true

generation:
  provider: ollama
  ollama_url: http://localhost:11434
  ollama_chat_model: llama3.2:3b
  max_context_docs: 5
  temperature: 0.2
  allow_extractive_fallback: true
